name: Deploy .NET 10 API + Angular to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi'
  DOTNET_VERSION: '10.0.x'
  DOTNET_QUALITY: 'daily'
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore .NET dependencies
        run: dotnet restore ./backend/backend.csproj
      
      - name: Build .NET API
        run: dotnet build ./backend/backend.csproj --configuration Release --no-restore
      
      - name: Publish .NET API
        run: dotnet publish ./backend/backend.csproj -c Release -o ./publish/backend
      
      - name: Copy SQLite database
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
          fi
      
      - name: Install Angular dependencies
        run: |
          cd ./frontend
          rm -f package-lock.json
          npm install
      
      - name: Build Angular app
        run: |
          cd ./frontend
          npm run build -- --configuration production
      
      - name: Copy Angular to wwwroot
        run: |
          # Criar pasta wwwroot
          mkdir -p ./publish/backend/wwwroot
          
          # Encontrar e copiar os arquivos do Angular
          if [ -d "./frontend/dist/frontend/browser" ]; then
            cp -r ./frontend/dist/frontend/browser/* ./publish/backend/wwwroot/
            echo "✅ Copied from dist/frontend/browser"
          elif [ -d "./frontend/dist/frontend" ]; then
            cp -r ./frontend/dist/frontend/* ./publish/backend/wwwroot/
            echo "✅ Copied from dist/frontend"
          elif [ -d "./frontend/dist" ]; then
            cp -r ./frontend/dist/* ./publish/backend/wwwroot/
            echo "✅ Copied from dist"
          else
            echo "⚠️ No Angular build found"
          fi
          
          # Verificar o que foi copiado
          ls -la ./publish/backend/wwwroot/
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend

      - name: Debug Angular build output
  run: |
    echo "=== Angular build output ==="
    ls -la ./frontend/dist/
    find ./frontend/dist -type f -name "*.html" | head -5