name: Deploy .NET + Angular to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi'
  DOTNET_VERSION: '10.0.x'
  DOTNET_QUALITY: 'daily'
  NODE_VERSION: '20.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Build Angular
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production
          echo "✅ Angular build concluído"
          echo "--- Conteúdo de backend/wwwroot ---"
          ls -la ../backend/wwwroot/
      
      - name: Build & Publish .NET
        run: |
          cd backend
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish -c Release -o ../publish/backend
      
      - name: Copy SQLite
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
            echo "✅ SQLite copiado"
          fi
      
      - name: Verificar arquivos finais
        run: |
          echo "=== Conteúdo da pasta publish/backend ==="
          ls -la ./publish/backend/
          echo "=== Conteúdo de publish/backend/wwwroot (Angular) ==="
          ls -la ./publish/backend/wwwroot/ || echo "WWWROOT NÃO ENCONTRADA!"
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend