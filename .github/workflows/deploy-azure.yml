name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production
      
      - name: Publish Backend (with wwwroot)
        run: |
          cd backend
          dotnet restore
          dotnet build --configuration Release
          dotnet publish -c Release -o ../publish/backend
          # O Angular já está em backend/wwwroot, copia para publish
          cp -r wwwroot ../publish/backend/
      
      - name: Copy SQLite
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
          fi
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend