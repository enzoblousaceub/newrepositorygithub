name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi'   # 👈 NOME SEM O SUFIXO!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'daily'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: Build Backend
        run: |
          cd backend
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish -c Release -o ../publish/backend
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production
      
      - name: Copy Angular to wwwroot
        run: |
          mkdir -p ./publish/backend/wwwroot
          if [ -d "./backend/wwwroot" ]; then
            cp -r ./backend/wwwroot/* ./publish/backend/wwwroot/
          elif [ -d "./frontend/dist/frontend/browser" ]; then
            cp -r ./frontend/dist/frontend/browser/* ./publish/backend/wwwroot/
          elif [ -d "./frontend/dist/frontend" ]; then
            cp -r ./frontend/dist/frontend/* ./publish/backend/wwwroot/
          fi
          ls -la ./publish/backend/wwwroot/
      
      - name: Copy SQLite
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
          fi
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend