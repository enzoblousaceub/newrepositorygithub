name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi-ccddf0bxg7g2b6am'
  DOTNET_VERSION: '10.0.x'
  DOTNET_QUALITY: 'daily'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: Build Backend
        run: |
          cd backend
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish -c Release -o ../publish/backend
      
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production
          mkdir -p ../publish/backend/wwwroot
          cp -r dist/frontend/browser/* ../publish/backend/wwwroot/ 2>/dev/null || \
          cp -r dist/frontend/* ../publish/backend/wwwroot/ 2>/dev/null || \
          cp -r dist/* ../publish/backend/wwwroot/
      
      - name: Copy SQLite
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
          fi
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend