name: Deploy .NET + Angular to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'stockmanagerapi'
  DOTNET_VERSION: '10.0.x'
  DOTNET_QUALITY: 'daily'
  NODE_VERSION: '20.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Build Angular
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production
          echo "✅ Angular build concluído"
          echo "--- Conteúdo de backend/wwwroot ---"
          ls -la ../backend/wwwroot/
      
      - name: Build .NET
        run: |
          cd backend
          dotnet restore
          dotnet build --configuration Release --no-restore
      
      - name: Publish .NET and copy Angular
        run: |
          # Publica o .NET
          cd backend
          dotnet publish -c Release -o ../publish/backend
          
          # CRÍTICO: Copia os arquivos do Angular para a RAIZ do publish
          if [ -d "./wwwroot" ]; then
            mkdir -p ../publish/backend/wwwroot
            cp -r ./wwwroot/* ../publish/backend/wwwroot/
            echo "✅ Angular copied from backend/wwwroot"
          elif [ -d "./angular-dist" ]; then
            cp -r ./angular-dist/* ../publish/backend/
          fi
          
          # Verificar se o index.html existe no publish
          echo "=== Verificando publish/backend ==="
          ls -la ../publish/backend/
          echo "=== Verificando publish/backend/wwwroot ==="
          ls -la ../publish/backend/wwwroot/ || echo "wwwroot não existe ainda"
      
      - name: Copy SQLite
        run: |
          mkdir -p ./publish/backend/Data
          if [ -f "./backend/Data/stock.db" ]; then
            cp ./backend/Data/stock.db ./publish/backend/Data/
            echo "✅ SQLite copiado"
          fi
      
      - name: Final verification
        run: |
          echo "=== Conteúdo FINAL que será enviado ao Azure ==="
          echo "--- Raiz do publish ---"
          ls -la ./publish/backend/
          echo "--- Pasta wwwroot (Angular) ---"
          ls -la ./publish/backend/wwwroot/ || echo "⚠️ WWWROOT NÃO ENCONTRADA!"
          
          # Se o index.html estiver na raiz, não em wwwroot
          if [ -f "./publish/backend/index.html" ]; then
            echo "✅ index.html está na RAIZ do publish!"
          elif [ -f "./publish/backend/wwwroot/index.html" ]; then
            echo "✅ index.html está em wwwroot"
          else
            echo "❌ index.html NÃO ENCONTRADO!"
            exit 1
          fi
      
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish/backend