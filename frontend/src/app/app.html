<div class="app-layout">
  <mat-toolbar class="app-toolbar" id="main-toolbar">
    <button mat-icon-button (click)="sidenavOpened = !sidenavOpened" id="btn-toggle-sidenav">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="toolbar-brand">
      <mat-icon class="brand-icon">inventory</mat-icon>
      <span class="brand-name">StockManager</span>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav [opened]="sidenavOpened" mode="side" class="app-sidenav" id="main-sidenav">
      <mat-nav-list>
        <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" id="nav-dashboard">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/products" routerLinkActive="active" id="nav-products">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <span matListItemTitle>Products</span>
        </a>
        <a mat-list-item routerLink="/products/new" routerLinkActive="active" id="nav-add-product">
          <mat-icon matListItemIcon>add_circle</mat-icon>
          <span matListItemTitle>Add Product</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
